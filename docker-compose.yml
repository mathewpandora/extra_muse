version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: polza-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: extra_muse_db
     
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: